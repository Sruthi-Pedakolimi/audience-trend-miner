services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/sample_outputs:/app/sample_outputs

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
